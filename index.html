<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0A0A0A" />
<title>Training Hall</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap');

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0A0A0A; }
  body { font-family: 'EB Garamond', serif; color: #F5F2EA; }
  ::-webkit-scrollbar { display: none; }
  button, input { font-family: inherit; }
  button { cursor: pointer; background: none; border: none; }
  input { outline: none; }

  .small-caps {
    font-variant-caps: all-small-caps;
    letter-spacing: 0.12em;
  }

  #app {
    max-width: 480px;
    margin: 16px auto;
    min-height: calc(100vh - 32px);
    position: relative;
    background: #0E0E0E;
    border: 1px solid #3A3A3A;
    box-shadow: 0 0 0 1px #0A0A0A, 0 0 0 5px #0A0A0A, 0 0 0 6px rgba(245,242,234,0.08);
    padding: 0 18px 70px;
  }

  .ornament-row { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 16px 0 0; }
  .ornament-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, #5A5A5A, transparent); }
  .ornament-mark { font-size: 13px; color: #7A1F2B; letter-spacing: 0.3em; }

  .header { padding: 14px 0 16px; text-align: center; }
  .title {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 36px;
    letter-spacing: 0.01em;
    color: #F5F2EA;
    line-height: 1.05;
  }
  .title-rule-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
  .title-rule { width: 56px; height: 1px; background: #3A3A3A; }
  .title-rule-dot { width: 4px; height: 4px; border-radius: 999px; background: #7A1F2B; }
  .subtitle-input {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 13.5px;
    color: #9A9A9A;
    background: transparent;
    border: none;
    width: 100%;
    text-align: center;
    margin-top: 10px;
    padding: 2px 0;
  }
  .subtitle-input::placeholder { color: #555; }

  .strip { display: flex; gap: 10px; overflow-x: auto; padding: 4px 0 16px; scroll-snap-type: x proximity; }
  .chip-wrap { position: relative; flex-shrink: 0; }
  .chip {
    scroll-snap-align: center; min-width: 60px; padding: 8px 10px; border-radius: 2px;
    border: 1px solid #2A2A2A; background: #121212;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .chip.active { border-color: #7A1F2B; background: rgba(122,31,43,0.16); }
  .chip-date {
    font-family: 'EB Garamond', serif; font-style: italic; font-size: 11.5px; color: #8A8A8A; font-weight: 600;
  }
  .chip.active .chip-date { color: #7A1F2B; }
  .chip-day { font-size: 16px; font-weight: 600; color: #9A9A9A; font-style: italic; }
  .chip.active .chip-day { color: #F5F2EA; }
  .chip-del {
    position: absolute; top: -7px; right: -7px; width: 18px; height: 18px; border-radius: 999px;
    background: #1A0E10; color: #C97A82; display: flex; align-items: center; justify-content: center;
    font-size: 12px; line-height: 1; border: 1px solid #5A1F26;
  }
  .chip-add {
    flex-shrink: 0; min-width: 60px; border-radius: 2px; border: 1px dashed #3A3A3A;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; color: #6E6E6E;
  }
  .chip-add span { font-size: 11px; font-style: italic; margin-top: 1px; }

  .banner { padding: 0 0 14px; }
  .banner-inner {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    padding: 12px 14px; border: 1px solid #3A3A3A; border-radius: 2px;
    background: linear-gradient(180deg, #161616, #101010);
  }
  .banner-label-input {
    font-family: 'EB Garamond', serif; font-style: italic; font-weight: 600; font-size: 20px;
    color: #F5F2EA; background: transparent; border: none; width: 100%; padding: 0;
  }
  .banner-sub {
    font-family: 'EB Garamond', serif; font-size: 11.5px; color: #9A9A9A; margin-top: 3px;
    text-transform: uppercase; letter-spacing: 0.14em;
  }
  .badge {
    width: 36px; height: 36px; border-radius: 999px; display: flex; align-items: center; justify-content: center;
    font-family: 'EB Garamond', serif; font-style: italic; font-weight: 600; font-size: 17px; flex-shrink: 0;
    background: radial-gradient(circle at 35% 30%, #9C3040, #5A141F);
    border: 1.5px solid #F5F2EA; color: #F5F2EA;
  }

  .daytabs { display: flex; gap: 4px; padding: 0 0 14px; overflow-x: auto; scroll-snap-type: x proximity; }
  .daytab-wrap { position: relative; flex-shrink: 0; display: flex; align-items: center; }
  .daytab {
    font-family: 'EB Garamond', serif; font-style: italic; padding: 6px 12px; color: #8A8A8A; font-size: 14px;
    border: 1px solid transparent; border-radius: 2px; white-space: nowrap; flex-shrink: 0;
  }
  .daytab.active { color: #7A1F2B; border-color: #2C1A1C; background: rgba(122,31,43,0.10); }
  .daytab-del { color: #6E6E6E; font-size: 13px; line-height: 1; flex-shrink: 0; margin-left: -4px; padding: 0 6px; }
  .daytab-add {
    font-family: 'EB Garamond', serif; font-style: italic; font-size: 13px; color: #6E6E6E;
    border: 1px dashed #3A3A3A; border-radius: 2px; padding: 6px 10px; flex-shrink: 0; white-space: nowrap;
  }

  .list { padding: 0; }
  .card {
    border: 1px solid #1F1F1F; border-radius: 2px; padding: 14px 14px 12px; margin-bottom: 10px; background: #131313;
  }
  .card.full { border-color: #7A1F2B; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }

  .ex-name {
    font-family: 'EB Garamond', serif; font-weight: 600; font-style: italic; font-size: 19px;
    color: #F5F2EA; line-height: 1.15;
  }
  .card.full .ex-name { color: #7A1F2B; }

  .ex-meta-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .stepper { display: flex; align-items: center; gap: 6px; }
  .stepper button {
    width: 20px; height: 20px; border-radius: 2px; border: 1px solid #2C2C2C; background: #1A1A1A;
    color: #8A8A8A; font-size: 13px; display: flex; align-items: center; justify-content: center;
  }
  .stepper-val { font-size: 12px; color: #8A8A8A; font-style: italic; letter-spacing: 0.02em; }

  .card-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .icon-btn { width: 24px; height: 24px; border-radius: 2px; display: flex; align-items: center; justify-content: center;
              color: #5A5A5A; border: 1px solid #232323; }
  .icon-btn.danger { color: #A04550; border-color: #3A1418; }

  .sets-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .pill {
    width: 64px; height: 38px; border-radius: 2px; border: 1px solid #2C2C2C; background: #161616;
    color: #5A5A5A; font-family: 'EB Garamond', serif; font-size: 15px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .pill.filled { background: #1D1D1D; color: #F5F2EA; font-weight: 600; }
  .pill.target { border-color: #7A1F2B; background: rgba(122,31,43,0.18); color: #7A1F2B; }
  .pill-input {
    width: 64px; height: 38px; background: #0A0A0A; border: 1px solid #7A1F2B; border-radius: 2px;
    color: #F5F2EA; font-family: 'EB Garamond', serif; font-size: 15px; text-align: center;
  }

  .add-weight {
    display: flex; align-items: center; gap: 5px; margin-left: 2px; color: #7A1F2B;
    font-size: 13.5px; font-style: italic; font-family: 'EB Garamond', serif; letter-spacing: 0.04em;
  }

  .add-ex-row { display: flex; gap: 8px; padding: 4px 0 18px; }
  .add-ex-input {
    flex: 1; height: 42px; border-radius: 2px; border: 1px dashed #3A3A3A; background: #0F0F0F;
    color: #F5F2EA; font-family: 'EB Garamond', serif; font-style: italic; font-size: 15px; padding: 0 12px;
  }
  .add-ex-input::placeholder { color: #555; }
  .add-ex-btn {
    width: 42px; height: 42px; border-radius: 2px; border: 1px solid #7A1F2B; background: rgba(122,31,43,0.14);
    color: #7A1F2B; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px;
  }

  .loading {
    display: flex; align-items: center; justify-content: center; min-height: 60vh;
    color: #6E6E6E; font-size: 14px; font-style: italic;
  }

  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.78); display: flex; align-items: center;
    justify-content: center; padding: 24px; z-index: 50;
  }
  .confirm-box {
    background: #121212; border: 1px solid #7A1F2B; border-radius: 2px; padding: 22px;
    max-width: 340px; width: 100%; box-shadow: 0 0 30px rgba(0,0,0,0.6);
  }
  .confirm-title { font-family: 'EB Garamond', serif; font-style: italic; font-weight: 600; font-size: 20px; margin-bottom: 8px; color: #F5F2EA; }
  .confirm-body { font-size: 14px; color: #9A9A9A; margin-bottom: 18px; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 12px; }
  .confirm-actions button { flex: 1; height: 40px; border-radius: 2px; font-size: 14px; font-style: italic; font-family: 'EB Garamond', serif; }
  .confirm-cancel { border: 1px solid #2C2C2C; background: #1A1A1A; color: #9A9A9A; }
  .confirm-delete { border: 1px solid #7A1F2B; background: rgba(122,31,43,0.28); color: #F5F2EA; }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function () {
  "use strict";

  var REP_TARGET = 8;

  var DEFAULT_DAYS_LIST = [
    {
      key: "A", label: "Push Day",
      exercises: [
        { name: "Calf raise", sets: 3 },
        { name: "Lateral raise", sets: 2 },
        { name: "Hi bar squat / hack squat", sets: 2 },
        { name: "Overhead press", sets: 2 },
        { name: "Incline bench", sets: 3 },
        { name: "Leg extension", sets: 2 },
        { name: "Hip adduction", sets: 2 },
        { name: "Skull crusher", sets: 3 },
        { name: "Forearm curl", sets: 3 },
        { name: "Band pull apart", sets: 3 }
      ]
    },
    {
      key: "B", label: "Pull Day",
      exercises: [
        { name: "Calf raise", sets: 3 },
        { name: "Lateral raise", sets: 2 },
        { name: "SLDL", sets: 2 },
        { name: "Barbell row", sets: 2 },
        { name: "Weighted pull up", sets: 2 },
        { name: "Hamstring curl", sets: 2 },
        { name: "Hip abduction", sets: 2 },
        { name: "Bicep curl", sets: 3 },
        { name: "Forearm curl", sets: 3 },
        { name: "Band pull apart", sets: 3 }
      ]
    }
  ];

  // generates the next short key (A, B, C, ... Z, AA, AB, ...) not already in use
  function nextDayKey(existingKeys) {
    var letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    for (var len = 1; len <= 2; len++) {
      for (var i = 0; i < Math.pow(26, len); i++) {
        var key = "";
        var n = i;
        for (var p = 0; p < len; p++) {
          key = letters[n % 26] + key;
          n = Math.floor(n / 26);
        }
        if (existingKeys.indexOf(key) === -1) return key;
      }
    }
    return "X" + Date.now();
  }

  function todayISO() {
    return new Date().toISOString().slice(0, 10);
  }
  function fmtShort(iso) {
    var d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }
  function exKey(dayKey, exId) {
    return dayKey + "__" + exId;
  }
  function uid() {
    return Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
  }
  function storageGet(key) {
    try {
      var raw = window.localStorage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }
  function storageSet(key, value) {
    try { window.localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
  }

  var state = {
    loaded: false,
    appName: "Training Hall",
    subtitle: "Four to eight reps across all sets, then add weight",
    days: {},
    dayOrder: [],
    sessions: [],
    logs: {},
    activeSessionId: null,
    exHistory: {},
    pendingDelete: null,
    pendingDeleteDay: null
  };

  function migrateExercises(exercises) {
    return exercises.map(function (ex) {
      if (!ex.id) ex.id = uid();
      return ex;
    });
  }

  function init() {
    var savedDays = storageGet("th:days");
    var savedOrder = storageGet("th:dayOrder");
    var savedName = storageGet("th:appName");
    var savedSubtitle = storageGet("th:subtitle");
    var sess = storageGet("th:sessions") || [];
    var lg = storageGet("th:logs") || {};

    var days, order;
    if (savedDays) {
      days = savedDays;
      order = savedOrder && savedOrder.length ? savedOrder : Object.keys(days);
    } else {
      days = {};
      order = [];
      DEFAULT_DAYS_LIST.forEach(function (d) {
        days[d.key] = JSON.parse(JSON.stringify(d));
        order.push(d.key);
      });
    }
    Object.keys(days).forEach(function (k) {
      days[k].exercises = migrateExercises(days[k].exercises);
    });
    // guard against stale order referencing removed days, or missing entries
    order = order.filter(function (k) { return days[k]; });
    Object.keys(days).forEach(function (k) {
      if (order.indexOf(k) === -1) order.push(k);
    });

    if (sess.length === 0) {
      var id = todayISO() + "_" + order[0];
      sess = [{ id: id, date: todayISO(), dayKey: order[0] }];
      lg = {};
      lg[id] = {};
    }

    state.days = days;
    state.dayOrder = order;
    state.appName = savedName || state.appName;
    state.subtitle = savedSubtitle != null ? savedSubtitle : state.subtitle;
    state.sessions = sess;
    state.logs = lg;
    state.activeSessionId = sess[sess.length - 1].id;
    state.loaded = true;

    persistDays();
    persistSessions();
    persistLogs();
    persistMeta();
    recomputeHistory();
    render();
  }

  function recomputeHistory() {
    var hist = {};
    state.sessions.forEach(function (s) {
      var dayDef = state.days[s.dayKey];
      if (!dayDef) return;
      dayDef.exercises.forEach(function (ex) {
        var k = exKey(s.dayKey, ex.id);
        var entry = (state.logs[s.id] || {})[k];
        if (!entry) return;
        var weights = [];
        Object.keys(entry).forEach(function (kk) {
          var v = entry[kk];
          if (!v) return;
          var m = v.match(/^(\d+(?:\.\d+)?)/);
          if (m) weights.push(parseFloat(m[1]));
        });
        if (weights.length) {
          var top = Math.max.apply(null, weights);
          if (!hist[k]) hist[k] = [];
          hist[k].push(top);
        }
      });
    });
    state.exHistory = hist;
  }

  function persistLogs() { storageSet("th:logs", state.logs); }
  function persistSessions() { storageSet("th:sessions", state.sessions); }
  function persistDays() {
    storageSet("th:days", state.days);
    storageSet("th:dayOrder", state.dayOrder);
  }
  function persistMeta() {
    storageSet("th:appName", state.appName);
    storageSet("th:subtitle", state.subtitle);
  }

  function handleSetChange(dayKey, exId, setIdx, value) {
    var k = exKey(dayKey, exId);
    if (!state.logs[state.activeSessionId]) state.logs[state.activeSessionId] = {};
    var sessLog = state.logs[state.activeSessionId];
    if (!sessLog[k]) sessLog[k] = {};
    sessLog[k][setIdx] = value;
    persistLogs();
    recomputeHistory();
    render();
  }

  function nextSuggestedDay() {
    var keys = state.dayOrder;
    if (state.sessions.length === 0) return keys[0];
    var last = state.sessions[state.sessions.length - 1];
    var idx = keys.indexOf(last.dayKey);
    if (idx === -1) return keys[0];
    return keys[(idx + 1) % keys.length] || keys[0];
  }

  function addSession(dayKey) {
    var id = todayISO() + "_" + dayKey + "_" + Date.now();
    state.sessions.push({ id: id, date: todayISO(), dayKey: dayKey });
    state.logs[id] = {};
    persistSessions();
    persistLogs();
    state.activeSessionId = id;
    render();
    requestAnimationFrame(function () {
      var strip = document.getElementById("strip");
      if (strip) strip.scrollLeft = strip.scrollWidth;
    });
  }

  function setActiveSession(id) {
    state.activeSessionId = id;
    render();
  }

  function requestDeleteSession(id) {
    state.pendingDelete = id;
    render();
  }
  function cancelDeleteSession() {
    state.pendingDelete = null;
    render();
  }
  function confirmDeleteSession() {
    var id = state.pendingDelete;
    if (!id) return;
    state.sessions = state.sessions.filter(function (s) { return s.id !== id; });
    delete state.logs[id];
    if (state.activeSessionId === id) {
      state.activeSessionId = state.sessions.length
        ? state.sessions[state.sessions.length - 1].id
        : null;
      if (!state.activeSessionId) {
        var newId = todayISO() + "_" + Object.keys(state.days)[0];
        state.sessions = [{ id: newId, date: todayISO(), dayKey: Object.keys(state.days)[0] }];
        state.logs[newId] = {};
        state.activeSessionId = newId;
        persistSessions();
      }
    }
    state.pendingDelete = null;
    persistSessions();
    persistLogs();
    recomputeHistory();
    render();
  }

  function renameDay(dayKey, newLabel) {
    state.days[dayKey].label = newLabel || state.days[dayKey].label;
    persistDays();
  }

  function addDay() {
    var key = nextDayKey(state.dayOrder);
    state.days[key] = { key: key, label: "New Day", exercises: [] };
    state.dayOrder.push(key);
    persistDays();
    render();
  }

  function requestDeleteDay(dayKey) {
    state.pendingDeleteDay = dayKey;
    render();
  }
  function cancelDeleteDay() {
    state.pendingDeleteDay = null;
    render();
  }
  function confirmDeleteDay() {
    var key = state.pendingDeleteDay;
    if (!key) return;
    if (state.dayOrder.length <= 1) {
      state.pendingDeleteDay = null;
      render();
      return; // never allow deleting the last remaining day
    }
    state.dayOrder = state.dayOrder.filter(function (k) { return k !== key; });
    delete state.days[key];
    // remove sessions + logs tied to that day
    var keptSessionIds = {};
    state.sessions = state.sessions.filter(function (s) {
      if (s.dayKey === key) { return false; }
      keptSessionIds[s.id] = true;
      return true;
    });
    Object.keys(state.logs).forEach(function (sid) {
      if (!keptSessionIds[sid]) delete state.logs[sid];
    });
    if (!state.sessions.length) {
      var newId = todayISO() + "_" + state.dayOrder[0];
      state.sessions = [{ id: newId, date: todayISO(), dayKey: state.dayOrder[0] }];
      state.logs[newId] = {};
    }
    if (!state.sessions.filter(function (s) { return s.id === state.activeSessionId; }).length) {
      state.activeSessionId = state.sessions[state.sessions.length - 1].id;
    }
    state.pendingDeleteDay = null;
    persistDays();
    persistSessions();
    persistLogs();
    recomputeHistory();
    render();
  }

  function changeSets(dayKey, exId, delta) {
    var ex = state.days[dayKey].exercises.filter(function (e) { return e.id === exId; })[0];
    if (!ex) return;
    ex.sets = Math.max(1, Math.min(8, ex.sets + delta));
    persistDays();
    render();
  }

  function removeExercise(dayKey, exId) {
    state.days[dayKey].exercises = state.days[dayKey].exercises.filter(function (e) { return e.id !== exId; });
    persistDays();
    render();
  }

  function addExercise(dayKey, name) {
    if (!name || !name.trim()) return;
    state.days[dayKey].exercises.push({ id: uid(), name: name.trim(), sets: 3 });
    persistDays();
    render();
  }

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    attrs = attrs || {};
    Object.keys(attrs).forEach(function (key) {
      if (key === "class") node.className = attrs[key];
      else if (key === "style") node.setAttribute("style", attrs[key]);
      else if (key.indexOf("on") === 0 && typeof attrs[key] === "function") {
        node.addEventListener(key.slice(2).toLowerCase(), attrs[key]);
      } else if (key === "text") {
        node.textContent = attrs[key];
      } else {
        node.setAttribute(key, attrs[key]);
      }
    });
    (children || []).forEach(function (c) {
      if (c == null) return;
      if (typeof c === "string") node.appendChild(document.createTextNode(c));
      else node.appendChild(c);
    });
    return node;
  }

  function svgEl(tag, attrs) {
    var node = document.createElementNS("http://www.w3.org/2000/svg", tag);
    Object.keys(attrs).forEach(function (k) { node.setAttribute(k, attrs[k]); });
    return node;
  }

  function renderSparkline(points) {
    var w = 56, h = 20;
    if (!points || points.length < 2) return el("div", { style: "height:20px;flex-shrink:0" }, []);
    var max = Math.max.apply(null, points.concat([1]));
    var min = Math.min.apply(null, points.concat([0]));
    var range = max - min || 1;
    var stepX = w / (points.length - 1);
    var coords = points.map(function (p, i) {
      var x = i * stepX;
      var y = h - ((p - min) / range) * (h - 4) - 2;
      return [x, y];
    });
    var path = coords.map(function (c, i) {
      return (i === 0 ? "M" : "L") + c[0].toFixed(1) + "," + c[1].toFixed(1);
    }).join(" ");
    var last = coords[coords.length - 1];
    var svg = svgEl("svg", { width: w, height: h, viewBox: "0 0 " + w + " " + h, style: "display:block;flex-shrink:0" });
    svg.appendChild(svgEl("path", { d: path, fill: "none", stroke: "#9B3B3B", "stroke-width": "1.6", "stroke-linecap": "round", "stroke-linejoin": "round" }));
    svg.appendChild(svgEl("circle", { cx: last[0], cy: last[1], r: "2", fill: "#9B3B3B" }));
    return svg;
  }

  function icon(name) {
    var svg = svgEl("svg", { width: "13", height: "13", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", "stroke-width": "2.2", "stroke-linecap": "round" });
    if (name === "plus") {
      svg.appendChild(svgEl("line", { x1: 12, y1: 5, x2: 12, y2: 19 }));
      svg.appendChild(svgEl("line", { x1: 5, y1: 12, x2: 19, y2: 12 }));
    } else if (name === "minus") {
      svg.appendChild(svgEl("line", { x1: 5, y1: 12, x2: 19, y2: 12 }));
    } else if (name === "trash") {
      svg.setAttribute("stroke-width", "1.8");
      svg.appendChild(svgEl("path", { d: "M3 6h18" }));
      svg.appendChild(svgEl("path", { d: "M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2" }));
      svg.appendChild(svgEl("path", { d: "M19 6l-1 14a1 1 0 01-1 1H7a1 1 0 01-1-1L5 6" }));
    }
    return svg;
  }

  function renderPill(dayKey, exId, idx, value) {
    var wrap = el("div", {});
    var repsMatch = (value || "").match(/x\s*(\d+)/i);
    var repsNum = repsMatch ? parseInt(repsMatch[1], 10) : null;
    var isFull = repsNum !== null && repsNum >= REP_TARGET;

    function showButton() {
      wrap.innerHTML = "";
      var cls = "pill" + (value ? " filled" : "") + (isFull ? " target" : "");
      var btn = el("button", { class: cls, type: "button", text: value || "—" });
      btn.addEventListener("click", function () { showInput(); });
      wrap.appendChild(btn);
    }

    function showInput() {
      wrap.innerHTML = "";
      var input = el("input", { class: "pill-input", type: "text", inputmode: "text", placeholder: "45x6", value: value || "" });
      wrap.appendChild(input);
      input.focus();
      function commit() { handleSetChange(dayKey, exId, idx, input.value.trim()); }
      input.addEventListener("blur", commit);
      input.addEventListener("keydown", function (e) { if (e.key === "Enter") commit(); });
    }

    showButton();
    return wrap;
  }

  function renderExerciseCard(dayKey, ex, sessionLog) {
    var setsArr = [];
    for (var i = 0; i < ex.sets; i++) setsArr.push((sessionLog[exKey(dayKey, ex.id)] || {})[i] || "");
    var history = state.exHistory[exKey(dayKey, ex.id)] || [];

    var allFull = ex.sets > 0 && setsArr.every(function (s) { return s; }) && setsArr.every(function (s) {
      var m = s.match(/x\s*(\d+)/i);
      return m && parseInt(m[1], 10) >= REP_TARGET;
    });

    var card = el("div", { class: "card" + (allFull ? " full" : "") });
    var top = el("div", { class: "card-top" });

    var left = el("div", { style: "flex:1;min-width:0" }, [
      el("div", { class: "ex-name", text: ex.name })
    ]);

    var metaRow = el("div", { class: "ex-meta-row" });
    var minus = el("button", { type: "button" }, [icon("minus")]);
    minus.addEventListener("click", function () { changeSets(dayKey, ex.id, -1); });
    var plus = el("button", { type: "button" }, [icon("plus")]);
    plus.addEventListener("click", function () { changeSets(dayKey, ex.id, 1); });
    var stepper = el("div", { class: "stepper" }, [minus, el("span", { class: "stepper-val", text: ex.sets + " sets" }), plus]);
    metaRow.appendChild(stepper);
    metaRow.appendChild(el("span", { class: "stepper-val", text: "4–" + REP_TARGET + " reps" }));
    left.appendChild(metaRow);

    var actions = el("div", { class: "card-actions" });
    var delBtn = el("button", { class: "icon-btn danger", type: "button" }, [icon("trash")]);
    delBtn.addEventListener("click", function () { removeExercise(dayKey, ex.id); });
    actions.appendChild(delBtn);

    top.appendChild(left);
    top.appendChild(renderSparkline(history));
    top.appendChild(actions);
    card.appendChild(top);

    var setsRow = el("div", { class: "sets-row" });
    setsArr.forEach(function (val, i) {
      setsRow.appendChild(renderPill(dayKey, ex.id, i, val));
    });
    if (allFull) {
      setsRow.appendChild(el("div", { class: "add-weight", text: "add weight" }));
    }
    card.appendChild(setsRow);
    return card;
  }

  function renderAddExerciseRow(dayKey) {
    var input = el("input", { class: "add-ex-input", type: "text", placeholder: "write in another exercise…" });
    var btn = el("button", { class: "add-ex-btn", type: "button", text: "+" });
    function submit() {
      addExercise(dayKey, input.value);
      input.value = "";
    }
    btn.addEventListener("click", submit);
    input.addEventListener("keydown", function (e) { if (e.key === "Enter") submit(); });
    return el("div", { class: "add-ex-row" }, [input, btn]);
  }

  function renderConfirmOverlay() {
    var sess = state.sessions.filter(function (s) { return s.id === state.pendingDelete; })[0];
    var dayLabel = sess && state.days[sess.dayKey] ? state.days[sess.dayKey].label : "this session";
    var dateLabel = sess ? fmtShort(sess.date) : "";
    var overlay = el("div", { class: "confirm-overlay" });
    var cancelBtn = el("button", { class: "confirm-cancel", type: "button", text: "cancel" });
    cancelBtn.addEventListener("click", cancelDeleteSession);
    var delBtn = el("button", { class: "confirm-delete", type: "button", text: "delete" });
    delBtn.addEventListener("click", confirmDeleteSession);
    var box = el("div", { class: "confirm-box" }, [
      el("div", { class: "confirm-title", text: "Delete this entry?" }),
      el("div", { class: "confirm-body", text: dateLabel + " · " + dayLabel + " — this erases all logged sets for that session, for good." }),
      el("div", { class: "confirm-actions" }, [cancelBtn, delBtn])
    ]);
    overlay.appendChild(box);
    overlay.addEventListener("click", function (e) { if (e.target === overlay) cancelDeleteSession(); });
    return overlay;
  }

  function renderConfirmDayOverlay() {
    var d = state.days[state.pendingDeleteDay];
    var label = d ? d.label : "this day";
    var sessionCount = state.sessions.filter(function (s) { return s.dayKey === state.pendingDeleteDay; }).length;
    var overlay = el("div", { class: "confirm-overlay" });
    var cancelBtn = el("button", { class: "confirm-cancel", type: "button", text: "cancel" });
    cancelBtn.addEventListener("click", cancelDeleteDay);
    var delBtn = el("button", { class: "confirm-delete", type: "button", text: "delete" });
    delBtn.addEventListener("click", confirmDeleteDay);
    var body = "\u201c" + label + "\u201d and its exercise list go away for good";
    if (sessionCount > 0) {
      body += ", along with " + sessionCount + " logged session" + (sessionCount === 1 ? "" : "s") + " for that day.";
    } else {
      body += ".";
    }
    var box = el("div", { class: "confirm-box" }, [
      el("div", { class: "confirm-title", text: "Delete this whole day?" }),
      el("div", { class: "confirm-body", text: body }),
      el("div", { class: "confirm-actions" }, [cancelBtn, delBtn])
    ]);
    overlay.appendChild(box);
    overlay.addEventListener("click", function (e) { if (e.target === overlay) cancelDeleteDay(); });
    return overlay;
  }

  function render() {
    var root = document.getElementById("app");
    root.innerHTML = "";

    if (!state.loaded) {
      root.appendChild(el("div", { class: "loading", text: "loading…" }));
      return;
    }

    var dayKeys = state.dayOrder;
    var activeSession = state.sessions.filter(function (s) { return s.id === state.activeSessionId; })[0];
    var dayDef = activeSession ? state.days[activeSession.dayKey] : state.days[dayKeys[0]];
    var sessionLog = activeSession ? (state.logs[activeSession.id] || {}) : {};

    var topOrnament = el("div", { class: "ornament-row" }, [
      el("div", { class: "ornament-line" }),
      el("span", { class: "ornament-mark", text: "✦" }),
      el("div", { class: "ornament-line" })
    ]);
    root.appendChild(topOrnament);

    var nameDisplay = el("div", { class: "title", text: state.appName });
    var titleRuleRow = el("div", { class: "title-rule-row" }, [
      el("div", { class: "title-rule" }),
      el("div", { class: "title-rule-dot" }),
      el("div", { class: "title-rule" })
    ]);
    var subtitleInput = el("input", { class: "subtitle-input", value: state.subtitle, placeholder: "add a note for this program…" });
    subtitleInput.addEventListener("blur", function () {
      state.subtitle = subtitleInput.value;
      persistMeta();
    });
    var header = el("div", { class: "header" }, [
      nameDisplay,
      titleRuleRow,
      subtitleInput
    ]);
    root.appendChild(header);

    var strip = el("div", { class: "strip", id: "strip" });
    state.sessions.forEach(function (s) {
      var isActive = s.id === state.activeSessionId;
      var d = state.days[s.dayKey];
      if (!d) return;
      var chip = el("button", { class: "chip" + (isActive ? " active" : ""), type: "button" }, [
        el("span", { class: "chip-date", text: fmtShort(s.date) }),
        el("span", { class: "chip-day", text: d.key })
      ]);
      chip.addEventListener("click", function () { setActiveSession(s.id); });
      var delChip = el("button", { class: "chip-del", type: "button", text: "×" });
      delChip.addEventListener("click", function (e) {
        e.stopPropagation();
        requestDeleteSession(s.id);
      });
      var wrap = el("div", { class: "chip-wrap" }, [chip, delChip]);
      strip.appendChild(wrap);
    });
    var nextDay = nextSuggestedDay();
    var addBtn = el("button", { class: "chip-add", type: "button" }, [
      el("span", { text: "+ " + (state.days[nextDay] ? state.days[nextDay].key : "") })
    ]);
    addBtn.addEventListener("click", function () { addSession(nextDay); });
    strip.appendChild(addBtn);
    root.appendChild(strip);

    var tabs = el("div", { class: "daytabs", id: "daytabs" });
    dayKeys.forEach(function (k) {
      var d = state.days[k];
      if (!d) return;
      var isCurrentTemplate = dayDef && dayDef.key === d.key;
      var tabWrap = el("div", { class: "daytab-wrap" });
      var tab = el("button", {
        class: "daytab" + (isCurrentTemplate ? " active" : ""),
        type: "button",
        text: d.label
      });
      tab.addEventListener("click", function () {
        var matching = state.sessions.filter(function (s) { return s.dayKey === d.key; });
        if (matching.length) {
          state.activeSessionId = matching[matching.length - 1].id;
        } else {
          addSession(d.key);
          return;
        }
        render();
      });
      tabWrap.appendChild(tab);
      if (state.dayOrder.length > 1) {
        var delTab = el("button", { class: "daytab-del", type: "button", text: "×" });
        delTab.addEventListener("click", function (e) {
          e.stopPropagation();
          requestDeleteDay(d.key);
        });
        tabWrap.appendChild(delTab);
      }
      tabs.appendChild(tabWrap);
    });
    var addDayBtn = el("button", { class: "daytab-add", type: "button", text: "+ add day" });
    addDayBtn.addEventListener("click", addDay);
    tabs.appendChild(addDayBtn);
    root.appendChild(tabs);

    var badge = el("div", { class: "badge", text: dayDef.key });
    var labelInput = el("input", { class: "banner-label-input", value: dayDef.label });
    labelInput.addEventListener("blur", function () { renameDay(dayDef.key, labelInput.value); });
    labelInput.addEventListener("keydown", function (e) { if (e.key === "Enter") labelInput.blur(); });
    var bannerInner = el("div", { class: "banner-inner" }, [
      el("div", { style: "flex:1;min-width:0" }, [
        labelInput,
        el("div", { class: "banner-sub small-caps", text: dayDef.exercises.length + " exercises" })
      ]),
      badge
    ]);
    root.appendChild(el("div", { class: "banner" }, [bannerInner]));

    var list = el("div", { class: "list" });
    dayDef.exercises.forEach(function (ex) {
      list.appendChild(renderExerciseCard(dayDef.key, ex, sessionLog));
    });
    list.appendChild(renderAddExerciseRow(dayDef.key));
    root.appendChild(list);

    if (state.pendingDelete) {
      root.appendChild(renderConfirmOverlay());
    }
    if (state.pendingDeleteDay) {
      root.appendChild(renderConfirmDayOverlay());
    }

    requestAnimationFrame(function () {
      var stripEl = document.getElementById("strip");
      if (stripEl) stripEl.scrollLeft = stripEl.scrollWidth;
    });
  }

  init();
})();
</script>
</body>
</html>
